on:
  workflow_dispatch:
    inputs: {}
  push:
    tags:
      - '*-cn'

name: CN Release

env:
  NATIVE_DEPS_TAG: native-dependencies

jobs:
  detect-native-deps:
    name: Detect Native Dependency Updates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      component: ${{ steps.check.outputs.component }}
      cef_version: ${{ steps.check.outputs.cef_version }}
      libvlc_version: ${{ steps.check.outputs.libvlc_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Compare props versions to release assets
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          CEF=$(sed -n 's/.*<CefSharpVersion>\([^<]*\)<\/CefSharpVersion>.*/\1/p' NativeDependencies.props | head -n1)
          VLC=$(sed -n 's/.*<LibVlcVersion>\([^<]*\)<\/LibVlcVersion>.*/\1/p' NativeDependencies.props | head -n1)
          if [ -z "$CEF" ] || [ -z "$VLC" ]; then
            echo "Failed to read CefSharpVersion / LibVlcVersion from NativeDependencies.props"
            exit 1
          fi

          echo "cef_version=$CEF" >> "$GITHUB_OUTPUT"
          echo "libvlc_version=$VLC" >> "$GITHUB_OUTPUT"
          echo "Desired: cef-${CEF}.zip libvlc-${VLC}.zip"

          NEED_CEF=1
          NEED_VLC=1

          if gh release view "${{ env.NATIVE_DEPS_TAG }}" >/dev/null 2>&1; then
            ASSETS=$(gh release view "${{ env.NATIVE_DEPS_TAG }}" --json assets --jq '.assets[].name')
            echo "Existing assets under ${{ env.NATIVE_DEPS_TAG }}:"
            printf '%s\n' "$ASSETS"
            if printf '%s\n' "$ASSETS" | grep -Fxq "cef-${CEF}.zip"; then
              NEED_CEF=0
            fi
            if printf '%s\n' "$ASSETS" | grep -Fxq "libvlc-${VLC}.zip"; then
              NEED_VLC=0
            fi
          else
            echo "Release ${{ env.NATIVE_DEPS_TAG }} does not exist yet; will publish both"
          fi

          if [ "$NEED_CEF" -eq 1 ] && [ "$NEED_VLC" -eq 1 ]; then
            COMPONENT=both
          elif [ "$NEED_CEF" -eq 1 ]; then
            COMPONENT=cef
          elif [ "$NEED_VLC" -eq 1 ]; then
            COMPONENT=libvlc
          else
            COMPONENT=none
          fi

          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "NEED_CEF=$NEED_CEF NEED_VLC=$NEED_VLC -> component=$COMPONENT"

  release:
    name: CN Release
    needs: detect-native-deps
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          $ver = '${{ github.ref_name }}' -replace '-cn$',''
          dotnet build --no-restore -c Release --nologo -p:Version=$ver -p:FileVersion=$ver -p:AssemblyVersion=$ver

      - name: Write version into manifest
        run: |
          $ver = '${{ github.ref_name }}' -replace '-cn$',''
          $path = './XivMediaPlayer/bin/x64/Release/XivMediaPlayer.json'
          $content = get-content -path $path
          $content = $content -replace '0.0.0.0',$ver
          set-content -Path $path -Value $content

      - name: Pack updated native dependency zips
        if: needs.detect-native-deps.outputs.component != 'none'
        shell: bash
        env:
          COMPONENT: ${{ needs.detect-native-deps.outputs.component }}
          CEF_VERSION: ${{ needs.detect-native-deps.outputs.cef_version }}
          LIBVLC_VERSION: ${{ needs.detect-native-deps.outputs.libvlc_version }}
        run: |
          set -euo pipefail
          OUT="XivMediaPlayer/bin/x64/Release"
          ART="${GITHUB_WORKSPACE}/native-deps-artifacts"
          mkdir -p "$ART"

          if [ ! -d "$OUT/cef" ] || [ ! -d "$OUT/libvlc" ]; then
            echo "Expected cef/ and libvlc/ in build output"
            ls -la "$OUT"
            exit 1
          fi

          pushd "$OUT"
          if [ "$COMPONENT" = "both" ] || [ "$COMPONENT" = "cef" ]; then
            7z a "$ART/cef-${CEF_VERSION}.zip" cef
          fi
          if [ "$COMPONENT" = "both" ] || [ "$COMPONENT" = "libvlc" ]; then
            7z a "$ART/libvlc-${LIBVLC_VERSION}.zip" libvlc
          fi
          popd
          ls -la "$ART"

      - name: Publish native dependencies release
        if: needs.detect-native-deps.outputs.component != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${{ env.NATIVE_DEPS_TAG }}" >/dev/null 2>&1; then
            gh release create "${{ env.NATIVE_DEPS_TAG }}" \
              --prerelease \
              --title "Native dependencies (CEF / LibVLC)" \
              --notes "CefSharp and LibVLC native binaries for in-game autodownload. Do not download or install manually — the plugin fetches the matching asset when needed. Versions come from NativeDependencies.props."
          fi
          gh release upload "${{ env.NATIVE_DEPS_TAG }}" native-deps-artifacts/*.zip --clobber

      - name: Packing plugin release
        run: |
          pushd XivMediaPlayer/bin/x64/Release/
          
          # Native CEF/LibVLC ships from the fixed native-dependencies release; keep plugin zip small
          rm -rf cef libvlc
          
          # Remove duplicate native CEF binaries from the root directory to save space
          rm -f *.pak *.dat *.bin libcef.dll libGLESv2.dll libEGL.dll vk_swiftshader.dll vk_swiftshader_icd.json chrome_elf.dll d3dcompiler_47.dll dxcompiler.dll dxil.dll
          
          # Delete any latest.zip generated by DalamudPackager (which might be inside the XivMediaPlayer subfolder)
          find . -name "latest.zip" -type f -delete
          
          # Zip the lightweight managed plugin files
          7z a ../XivMediaPlayer.zip *
          
          popd
        shell: bash

      - name: Create plugin release
        uses: ncipollo/release-action@v1.21.0
        with:
          name: XivMediaPlayer ${{ github.ref_name }}
          artifacts: "./XivMediaPlayer/bin/x64/*.zip"
          tag: ${{ github.ref_name }}
          prerelease: true
          body: "CN build of the XivMediaPlayer plugin. Do not install this manually. Install via the Dalamud plugin repo!"
          omitBodyDuringUpdate: true
          allowUpdates: true
          replacesArtifacts: true

      - name: Write out repo.json
        run: |
          $tag = '${{ github.ref_name }}'
          $ver = $tag -replace '-cn$',''
          $repo = '${{ github.repository }}'
          $downloadUrl = "https://meowrs.com/https://github.com/$repo/releases/download/$tag/XivMediaPlayer.zip"
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].AssemblyVersion = $ver
          $json[0].TestingAssemblyVersion = $ver
          $json[0].RepoUrl = "https://github.com/$repo"
          $json[0].DownloadLinkInstall = $downloadUrl
          $json[0].DownloadLinkTesting = $downloadUrl
          $json[0].DownloadLinkUpdate = $downloadUrl
          $content = ConvertTo-Json @($json) -Depth 10
          set-content -Path $path -Value $content

      - name: Commit repo.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin cn
          git branch -f cn ${{ github.sha }}
          git checkout cn
          git add repo.json
          git commit -m "[CI] Updating repo.json for ${{ github.ref_name }}" || true
          git push origin cn

  trigger_workflow:
    name: Trigger DalamudPlugin CI
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Workflow in DalamudPlugin Repository
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MEOWRSTRIGGER }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/MeowZWR/DalamudPlugin/dispatches \
            -d '{"event_type": "request-update-run-action", "client_payload": {"unit": false, "integration": true}}'
