on:
  workflow_dispatch:
    inputs: {}
  push:
    tags:
      - '*-cn'

name: CN Release

jobs:
  release:
    name: CN Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '10.x.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          $ver = '${{ github.ref_name }}' -replace '-cn$',''
          dotnet build --no-restore -c Release --nologo -p:Version=$ver -p:FileVersion=$ver -p:AssemblyVersion=$ver

      - name: Write version into manifest
        run: |
          $ver = '${{ github.ref_name }}' -replace '-cn$',''
          $path = './XivMediaPlayer/bin/x64/Release/XivMediaPlayer.json'
          $content = get-content -path $path
          $content = $content -replace '0.0.0.0',$ver
          set-content -Path $path -Value $content

      - name: Packing Release
        run: |
          pushd XivMediaPlayer/bin/x64/Release/
          
          # Native CEF/LibVLC ships from the fixed native-dependencies release; keep plugin zip small
          rm -rf cef libvlc
          
          # Remove duplicate native CEF binaries from the root directory to save space
          rm -f *.pak *.dat *.bin libcef.dll libGLESv2.dll libEGL.dll vk_swiftshader.dll vk_swiftshader_icd.json chrome_elf.dll d3dcompiler_47.dll dxcompiler.dll dxil.dll
          
          # Delete any latest.zip generated by DalamudPackager (which might be inside the XivMediaPlayer subfolder)
          find . -name "latest.zip" -type f -delete
          
          # Zip the lightweight managed plugin files
          7z a ../XivMediaPlayer.zip *
          
          popd
        shell: bash

      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          name: XivMediaPlayer ${{ github.ref_name }}
          artifacts: "./XivMediaPlayer/bin/x64/*.zip"
          tag: ${{ github.ref_name }}
          prerelease: true
          body: "CN build of the XivMediaPlayer plugin. Do not install this manually. Install via the Dalamud plugin repo!"
          omitBodyDuringUpdate: true
          allowUpdates: true
          replacesArtifacts: true

      - name: Write out repo.json
        run: |
          $tag = '${{ github.ref_name }}'
          $ver = $tag -replace '-cn$',''
          $repo = '${{ github.repository }}'
          $downloadUrl = "https://meowrs.com/https://github.com/$repo/releases/download/$tag/XivMediaPlayer.zip"
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].AssemblyVersion = $ver
          $json[0].TestingAssemblyVersion = $ver
          $json[0].RepoUrl = "https://github.com/$repo"
          $json[0].DownloadLinkInstall = $downloadUrl
          $json[0].DownloadLinkTesting = $downloadUrl
          $json[0].DownloadLinkUpdate = $downloadUrl
          $content = ConvertTo-Json @($json) -Depth 10
          set-content -Path $path -Value $content

      - name: Commit repo.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin cn
          git branch -f cn ${{ github.sha }}
          git checkout cn
          git add repo.json
          git commit -m "[CI] Updating repo.json for ${{ github.ref_name }}" || true
          git push origin cn

  trigger_workflow:
    name: Trigger DalamudPlugin CI
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Workflow in DalamudPlugin Repository
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MEOWRSTRIGGER }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/MeowZWR/DalamudPlugin/dispatches \
            -d '{"event_type": "request-update-run-action", "client_payload": {"unit": false, "integration": true}}'
